<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>建立賽事（mockup）— BeyTop</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#13161c; --line:#2b313d;
    --txt:#e6e8ec; --dim:#8b93a3; --accent:#4d8dff; --good:#39d98a; --warn:#f5c451;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg); color:var(--txt);
    font-family:"Segoe UI","Microsoft JhengHei",system-ui,-apple-system,sans-serif;
    font-size:19px; line-height:1.5; padding:22px 16px 60px;
    padding-bottom:calc(60px + env(safe-area-inset-bottom));}
  .wrap{max-width:480px; margin:0 auto}

  .badge{display:inline-block; font-size:13px; font-weight:700; color:var(--warn);
    border:1px solid #4a4326; background:#211d10; border-radius:999px; padding:3px 11px; margin-bottom:12px}
  h1{font-size:28px; font-weight:800; margin:0 0 6px}
  .sub{color:var(--dim); font-size:16px; margin:0 0 22px}

  /* 區塊 */
  .group{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 15px; margin-bottom:14px}
  .group > .gtitle{font-size:14px; font-weight:700; color:var(--dim); letter-spacing:.5px; margin:0 0 12px}

  /* 欄位 */
  .field{margin-bottom:15px}
  .field:last-child{margin-bottom:0}
  label.lab{display:block; font-size:16px; font-weight:600; margin-bottom:6px}
  label.lab .req{color:var(--accent); margin-left:3px}
  label.lab .hint{display:block; font-weight:400; color:var(--dim); font-size:14px; margin-top:2px}
  input[type=text], input[type=date], input[type=number], select{
    width:100%; min-height:50px; font-size:19px; font-family:inherit;
    color:var(--txt); background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:0 13px; appearance:none}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238b93a3' d='M1 1l5 5 5-5'/></svg>");
    background-repeat:no-repeat; background-position:right 13px center; padding-right:34px}
  textarea{width:100%; min-height:84px; font-size:19px; line-height:1.5; font-family:inherit;
    color:var(--txt); background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:11px 13px; appearance:none; resize:vertical}
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--accent)}
  input::placeholder, textarea::placeholder{color:#5a6172}

  /* 人數上限：分段 + 數字 */
  .seg{display:flex; gap:8px; margin-bottom:9px}
  .seg button{flex:1; min-height:48px; font-size:17px; font-family:inherit; cursor:pointer;
    color:var(--dim); background:var(--panel2); border:1px solid var(--line); border-radius:10px}
  .seg button.on{color:var(--txt); border-color:var(--accent); background:#16213a; font-weight:700}
  #capRow{display:none}
  #capRow.show{display:block}

  .note{font-size:14px; color:var(--warn); margin-top:6px; display:none}
  .note.show{display:block}

  /* 送出 */
  .submit{width:100%; min-height:56px; font-size:19px; font-weight:800; font-family:inherit; cursor:pointer;
    color:#06210f; background:var(--good); border:0; border-radius:12px; margin-top:6px}
  .submit:active{transform:translateY(1px)}
  .err{color:#ff6b6b; font-size:16px; margin-top:10px; display:none; text-align:center}
  .err.show{display:block}

  .foot{color:#5a6172; font-size:13px; text-align:center; margin-top:18px}

  /* 假成功面板 */
  #done{display:none; text-align:center; padding:8px 0}
  #done.show{display:block}
  #done .ok{color:var(--good); font-size:18px; font-weight:800; margin-bottom:4px}
  #done .okname{color:var(--dim); font-size:16px; margin-bottom:18px}
  .qrbox{width:200px; height:200px; margin:0 auto 14px; border-radius:14px; background:#fff;
    display:flex; align-items:center; justify-content:center;
    background-image:
      linear-gradient(45deg,#0a0a0a 25%,transparent 25%),
      linear-gradient(-45deg,#0a0a0a 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#0a0a0a 75%),
      linear-gradient(-45deg,transparent 75%,#0a0a0a 75%);
    background-size:22px 22px; background-position:0 0,0 11px,11px -11px,-11px 0}
  .qrbox span{background:#fff; color:#888; font-size:14px; padding:3px 8px; border-radius:6px}
  .code{font-size:16px; color:var(--dim); margin-bottom:4px}
  .code b{color:var(--txt); font-size:26px; font-weight:800; letter-spacing:3px; font-family:ui-monospace,monospace}
  .again{margin-top:20px; color:var(--accent); font-size:16px; background:none; border:0; cursor:pointer; font-family:inherit}
</style>
</head>
<body>
<div class="wrap">
  <span class="badge">⚠ 測試樣板・假畫面，不會存資料</span>

  <div id="form">
    <h1>建立賽事</h1>
    <p class="sub">只有「賽事名稱」必填，其餘已帶好預設值，要調整再動就好。</p>

    <!-- 基本 -->
    <div class="group">
      <div class="gtitle">基本</div>
      <div class="field">
        <label class="lab">賽事名稱<span class="req">*</span></label>
        <input type="text" id="name" placeholder="例：週六例會賽 7/12" autocomplete="off">
      </div>
      <div class="field">
        <label class="lab">日期</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label class="lab">店家 <span class="hint" style="display:inline">可不填</span></label>
        <input type="text" id="store" placeholder="例：旋風玩具店" autocomplete="off">
      </div>
    </div>

    <!-- 賽制 -->
    <div class="group">
      <div class="gtitle">賽制</div>
      <div class="field">
        <label class="lab">幾對幾（每方出幾顆，自填）
          <span class="hint" id="vsHint">3V3＝每位選手帶 3 顆主力對打</span>
        </label>
        <input type="number" id="vs" value="3" min="1" max="9" inputmode="numeric">
      </div>
      <div class="field">
        <label class="lab">備用陀螺顆數
          <span class="hint">零件會打壞，可多帶備用；0＝禁止比賽中途換陀螺，陀螺打壞只能用相同零件替換</span>
        </label>
        <input type="number" id="spare" value="2" min="0" max="5" inputmode="numeric">
      </div>
      <div class="field">
        <label class="lab">盤別</label>
        <select id="format">
          <option selected>標準盤</option>
          <option>無限盤</option>
          <option>電動盤</option>
        </select>
      </div>
      <div class="field">
        <label class="lab">規則
          <span class="hint">可自填補充賽事規則；預設沿用通用規則</span>
        </label>
        <textarea id="rules">G3標準規則</textarea>
      </div>
    </div>

    <!-- 報到規則 -->
    <div class="group">
      <div class="gtitle">報到規則</div>
      <div class="field">
        <label class="lab">參賽人數上限</label>
        <div class="seg" id="capSeg">
          <button type="button" class="on" data-cap="none">無上限</button>
          <button type="button" data-cap="limit">限人數</button>
        </div>
        <div id="capRow">
          <input type="number" id="cap" value="32" min="1" inputmode="numeric" placeholder="人數">
        </div>
      </div>
      <div class="field">
        <label class="lab">選手編號發放
          <span class="hint">決定賽位號怎麼給</span>
        </label>
        <select id="seat">
          <option>報到順序（1、2、3…最單純）</option>
          <option selected>報到隨機（朋友一起報到較不會第一場就對決）</option>
          <option>開賽後抽籤（最公平，開賽才公布）</option>
          <option>主辦自填（自己排種子）</option>
        </select>
      </div>
      <div class="field">
        <label class="lab">報到截止方式</label>
        <select id="close">
          <option selected>手動按鈕</option>
          <option>額滿自動截止</option>
        </select>
        <div class="note" id="closeNote">額滿自動截止需先設「參賽人數上限」。</div>
      </div>
    </div>

    <button class="submit" id="create">建立賽事 → 產生 QR</button>
    <div class="err" id="err">請先填賽事名稱</div>
    <p class="foot">BeyTop 報到系統・建賽事表單樣板</p>
  </div>

  <!-- 假成功面板 -->
  <div id="done">
    <div class="ok">✓ 賽事已建立</div>
    <div class="okname" id="doneName"></div>
    <div class="qrbox"><span>QR 占位</span></div>
    <div class="code">賽事碼　<b id="code">ABC234</b></div>
    <p class="sub" style="margin-top:14px">選手掃這張 QR 即可報到。<br>（這是樣板畫面，沒有真的存進資料庫）</p>
    <button class="again" id="again">← 回去再試一次</button>
  </div>
</div>

<script>
  // 日期預設今天
  (function(){
    var d = new Date();
    var s = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    document.getElementById('date').value = s;
  })();

  // 幾對幾 → 主力顆數提示
  var vs = document.getElementById('vs'), vsHint = document.getElementById('vsHint');
  vs.addEventListener('input', function(){
    var n = vs.value || '?';
    vsHint.textContent = n + 'V' + n + '＝每位選手帶 ' + n + ' 顆主力對打';
  });

  // 人數上限 分段切換
  var capSeg = document.getElementById('capSeg'), capRow = document.getElementById('capRow');
  capSeg.addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    capSeg.querySelectorAll('button').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on');
    capRow.classList.toggle('show', b.dataset.cap === 'limit');
  });

  // 額滿自動截止需先設上限 → 提示
  var close = document.getElementById('close'), closeNote = document.getElementById('closeNote');
  function checkClose(){
    var isLimit = capSeg.querySelector('button.on').dataset.cap === 'limit';
    closeNote.classList.toggle('show', close.value.indexOf('額滿') === 0 && !isLimit);
  }
  close.addEventListener('change', checkClose);
  capSeg.addEventListener('click', checkClose);

  // 建立 → 假成功
  var nameEl = document.getElementById('name'), err = document.getElementById('err');
  document.getElementById('create').addEventListener('click', function(){
    if(!nameEl.value.trim()){
      err.classList.add('show'); nameEl.focus();
      try{ nameEl.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){}
      return;
    }
    err.classList.remove('show');
    var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789', code = '';
    for(var i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
    document.getElementById('code').textContent = code;
    document.getElementById('doneName').textContent = nameEl.value.trim();
    document.getElementById('form').style.display = 'none';
    document.getElementById('done').classList.add('show');
    window.scrollTo(0,0);
  });

  // 再試一次
  document.getElementById('again').addEventListener('click', function(){
    document.getElementById('done').classList.remove('show');
    document.getElementById('form').style.display = '';
    window.scrollTo(0,0);
  });
</script>
</body>
</html>
