<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>陀螺大數據 — 配置排行榜</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e6e8ec; --dim:#8b93a3;
    --good:#39d98a; --bad:#ff5d6c; --mid:#c8cdd6; --accent:#4d8dff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font-family:"Segoe UI","Microsoft JhengHei",system-ui,sans-serif;font-size:14px}
  .wrap{max-width:980px;margin:0 auto;padding:20px 14px 60px}
  h1{font-size:20px;margin:0 0 4px}
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .headr{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .stats{color:var(--dim);font-size:13px;white-space:nowrap}
  .search{display:flex;gap:6px;align-items:center}
  .search select,.search input{background:var(--panel);color:var(--txt);border:1px solid var(--line);
       border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit}
  .search input{width:190px}
  .search select{cursor:pointer}
  .search input:focus,.search select:focus{outline:none;border-color:var(--accent)}
  .langbar{margin:0 0 14px;display:flex;gap:8px}
  .langbar select{background:var(--panel);color:var(--txt);border:1px solid var(--line);
       border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;cursor:pointer}
  .langbar select:focus{outline:none;border-color:var(--accent)}
  .meta{color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.6}
  .note{color:#d9a441}
  table{width:100%;border-collapse:collapse;background:var(--panel);
        border:1px solid var(--line);border-radius:10px;overflow:hidden}
  thead th{position:sticky;top:0;background:#1b1f28;color:var(--dim);
           font-weight:600;text-align:right;padding:11px 12px;white-space:nowrap;
           cursor:pointer;user-select:none;border-bottom:1px solid var(--line);font-size:12px}
  thead th.l{text-align:left}
  thead th:hover{color:var(--txt)}
  th .ar{opacity:.5;font-size:10px;margin-left:3px}
  th .ar.on, table.mini th .ar.on, .pchead .ar.on{opacity:1;color:var(--accent)}
  tbody td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);
           white-space:nowrap}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#1d2230}
  .rank{color:var(--dim);width:42px;text-align:center}
  .combo{text-align:left}
  .cwrap{display:flex;align-items:center;gap:8px}
  .pics{display:flex;align-items:center;gap:4px;flex:0 0 auto}
  .pic{width:80px;height:80px;border-radius:8px;background:#0c0e12;border:1px solid var(--line);
       object-fit:contain;flex:0 0 auto}
  .pic.multi{width:64px;height:64px}
  .ph{width:80px;height:80px;border-radius:8px;background:#0c0e12;border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;color:var(--dim);
      font-weight:700;font-size:18px;flex:0 0 auto}
  .ph.code{font-size:20px;letter-spacing:.3px;color:var(--txt)}
  .nm{display:flex;flex-direction:column;line-height:1.25}
  .blade{font-weight:600}
  .sub{color:var(--dim);font-size:12px}
  .tag{display:inline-block;font-size:10px;color:var(--dim);border:1px solid var(--line);
       border-radius:4px;padding:0 5px;margin-left:6px;vertical-align:1px}
  .wr{font-weight:700}
  .bar{height:4px;border-radius:2px;background:#2a2f3a;margin-top:4px;overflow:hidden}
  .bar > i{display:block;height:100%}
  td.num{font-variant-numeric:tabular-nums}
  tr.main{cursor:pointer}
  tr.main .combo .blade::after{content:"▶";font-size:.7em;color:var(--dim);margin-left:6px;display:inline-block;transition:transform .15s}
  tr.main.open .combo .blade::after{transform:rotate(90deg)}
  /* 展開明細 */
  tr.detail.hidden{display:none}
  tr.detail > td{background:#10131a;padding:14px 16px}
  .detailwrap{display:flex;flex-wrap:wrap;gap:18px}
  .dcol{flex:1 1 200px;min-width:180px}
  .dcol.wide{flex:1 1 320px}
  .dh{font-size:12px;color:var(--dim);font-weight:700;margin-bottom:8px;border-bottom:1px solid var(--line);padding-bottom:4px}
  table.mini{width:100%;border:none;background:transparent;font-size:13px}
  table.mini th{position:static;background:transparent;text-align:right;color:var(--dim);font-weight:600;padding:3px 6px;border:none;cursor:default;font-size:12px}
  table.mini th.l,table.mini td.l{text-align:left}
  table.mini th.mu,table.mini th.sm{cursor:pointer}
  table.mini th.mu:hover,table.mini th.sm:hover{color:var(--txt)}
  table.mini th .ar{opacity:.6;font-size:9px;margin-left:2px}
  table.mini td{text-align:right;padding:3px 6px;border:none;white-space:nowrap}
  .showmore{cursor:pointer;color:var(--accent);font-weight:700;user-select:none;padding:8px 4px;text-align:center}
  .showmore:hover{text-decoration:underline}
  .morewrap.hidden{display:none}
  tr.more.hidden{display:none}
  .frow{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:13px}
  .flbl{width:68px;color:var(--dim)}
  .fbar{flex:1;height:8px;border-radius:4px;background:#2a2f3a;overflow:hidden}
  .fbar > i{display:block;height:100%}
  .fval{width:78px;text-align:right;font-variant-numeric:tabular-nums}
  .kv{margin:4px 0;font-size:13px}
  .dim{color:var(--dim)}
  .srctoggle{cursor:pointer;color:var(--accent);font-weight:700;user-select:none}
  .srctoggle::after{content:" ❐";font-weight:400}
  .srctoggle:hover{text-decoration:underline}
  thead th.src{cursor:default}
  thead th.src:hover{color:var(--dim)}
  /* 影片來源／對手配置彈窗 */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal.hidden{display:none}
  .mbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;width:min(560px,92vw);max-height:80vh;display:flex;flex-direction:column}
  .mhead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-weight:700}
  .mhead button{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
  .mhead button:hover{color:#fff}
  .mbody{padding:8px 16px 16px;overflow:auto}
  .mbody a{display:block;color:var(--accent);text-decoration:none;padding:8px 0;border-bottom:1px solid var(--line)}
  .mbody a:hover{text-decoration:underline}
  table.mini td.opp{cursor:pointer;color:var(--accent)}
  table.mini td.opp::after{content:" ❐";font-weight:400}
  table.mini td.opp:hover{color:var(--accent);text-decoration:underline}
  .oppcard{display:flex;align-items:center;gap:14px;padding:10px 4px}
  .oppcard .blade{font-weight:600;font-size:15px}
  .oppcard .sub{color:var(--dim);font-size:13px;margin-top:2px}
  /* 選手戰績（OP.GG 式：一場一列，可展開逐回合＋YT 回放） */
  .bhrow{border-bottom:1px solid var(--line)}
  .bhrow:last-child{border-bottom:none}
  .bhmain{display:flex;align-items:center;gap:12px;padding:8px 2px;cursor:pointer;flex-wrap:wrap}
  .bhmain:hover{color:#fff}
  .bhmain .bhopp::after{content:"▶";font-size:.7em;color:var(--dim);margin-left:6px;display:inline-block;transition:transform .15s}
  .bhmain.open .bhopp::after{transform:rotate(90deg)}
  .bhopp{font-weight:600;min-width:130px}
  .bhres{font-variant-numeric:tabular-nums}
  .bhevt{flex:1;font-size:12px}
  a.replay{color:var(--accent);text-decoration:none;font-weight:700;white-space:nowrap}
  a.replay:hover{text-decoration:underline}
  .bhrounds{padding:2px 0 10px}
  .bhrounds.hidden{display:none}
  /* 選手「常用陀螺」：仿配置排行榜的列＋可展開明細 */
  .pchead,.pcmain{display:flex;align-items:center;gap:10px}
  .pchead{padding:4px 6px;color:var(--dim);font-size:12px;border-bottom:1px solid var(--line)}
  .pcmain{padding:8px 6px;cursor:pointer;border-bottom:1px solid var(--line)}
  .pcmain:hover{background:#1d2230}
  .pccfg{flex:1;min-width:0}
  .pcnum{width:80px;text-align:right;font-variant-numeric:tabular-nums;flex:0 0 auto}
  .pcsrc{width:118px;text-align:right;flex:0 0 auto}
  .pcmain .blade::after{content:"▶";font-size:.7em;color:var(--dim);margin-left:6px;display:inline-block;transition:transform .15s}
  .pcmain.open .blade::after{transform:rotate(90deg)}
  .pcdetail{padding:6px 6px 14px}
  .pcdetail.hidden{display:none}
  .pchead .pccfg{text-align:left}
  .pcsort{cursor:pointer;user-select:none}
  .pcsort:hover{color:var(--txt)}
  .pchead .ar{opacity:.6;font-size:9px;margin-left:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1 id="title">陀螺大數據 · 配置排行榜</h1>
    <div class="headr">
      <div id="stats" class="stats"></div>
      <div class="search">
        <input id="sbox" type="search" placeholder="搜尋（上蓋／固鎖／軸心）" autocomplete="off">
      </div>
    </div>
  </div>
  <div class="langbar">
    <select id="lang">
      <option value="zh">中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
    <select id="view">
      <option value="full">完整陀螺</option>
      <option value="blade">上蓋</option>
      <option value="ratchet">固鎖</option>
      <option value="bit">軸心</option>
      <option value="players">選手</option>
    </select>
  </div>
  <div class="meta note" id="err"></div>
  <table id="tbl">
    <thead>
      <tr>
        <th class="l" data-k="rank"><span class="hl">#</span></th>
        <th class="l" data-k="combo"><span class="hl">配置（上蓋 / 固鎖 / 軸心）</span></th>
        <th data-k="winrate"><span class="hl">勝率</span><span class="ar"></span></th>
        <th data-k="pickrate"><span class="hl">出場率</span><span class="ar"></span></th>
        <th data-k="avg_points"><span class="hl">平均得分</span><span class="ar"></span></th>
        <th data-k="appearances"><span class="hl">場數</span><span class="ar"></span></th>
        <th class="src" data-k="src"><span class="hl">影片來源</span></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="meta" id="note" style="margin-top:14px">
    勝率＝該配置贏的回合 ÷ 出場回合；出場率＝出場回合 ÷ 全部回合；平均得分＝總得點 ÷ 出場回合。<br>
    點任一列可展開明細（每回合勝率/出場率、得分方式、勝負、對位戰績、影片來源）。
  </div>
</div>

<div id="modal" class="modal hidden">
  <div class="mbox">
    <div class="mhead"><span id="mtitle">影片來源</span><button id="mclose" type="button">✕</button></div>
    <div id="mbody" class="mbody"></div>
  </div>
</div>

<script src="data/ranking.js"></script>
<script>
(function(){
  var D = window.RANKING;
  if(!D){ document.getElementById('err').textContent = t('err'); return; }

  var rowsEl = document.getElementById('rows');
  var thead = document.querySelector('#tbl thead');
  var sortKey = 'pickrate', sortDir = -1;   // 預設：出場率高到低
  var currentArr = [];                       // 目前排序後的清單（給展開/彈窗索引）
  var searchText = '';                       // 搜尋關鍵字（單框，跨上蓋/固鎖/軸心自動比對）
  var lang = 'zh';                           // 介面與名稱語言（zh/en/ja），預設中文
  var view = 'full';                         // 彙總模式：full 完整 / blade 上蓋 / ratchet 固鎖 / bit 軸心

  // ---- 多語介面字典 ----
  var I18N = {
    zh: {
      title:'陀螺大數據 · 配置排行榜',
      stats:'本站資料共 {n} 回合',
      col_combo:'配置（上蓋 / 固鎖 / 軸心）', col_wr:'勝率', col_pr:'出場率', col_ap:'平均得分', col_n:'場數',

      d_perround:'每回合', d_round:'回合', d_plays:'出場', d_wr:'勝率', d_share:'出場佔比', d_career:'生涯紀錄', d_sum:'合計',
      d_finish:'得分方式', d_wl:'勝負樣本', d_win:'勝', d_loss:'負', d_avg:'平均得分',
      fin:{Spin:'轉停', Over:'擊飛', Burst:'爆裂', Xtreme:'極限'},
      src:'影片來源', d_match:'對位戰績', d_opp:'對手配置', d_faced:'遭遇',
      s_by:'各搭配明細', s_rb:'固鎖 · 軸心', s_n:'場次', s_combos:'種搭配',
      m_nodata:'無資料',
      view_players:'選手', col_player:'選手', col_record:'戰績', rec_w:'勝', rec_l:'敗',
      col_wr_battle:'整場勝率', col_rounds:'出戰回合', col_wr_round:'回合勝率', col_avg_round:'回合平均得分', show_more:'顯示更多', show_less:'收合',
      ph_player:'搜尋選手名', d_topbeys:'常用陀螺', d_record:'戰績', d_replay:'回放', d_mine:'本人', d_result:'勝負', p_vs:'vs',
      pnote1:'勝率＝整場 3on3 的勝場 ÷ 出場場數；戰績＝勝場-敗場；展開選手可看生涯逐回合紀錄與得分方式。',
      pnote2:'點選手展開常用陀螺、每回合表現、得分方式與戰績；點任一場可展開逐回合並開 YouTube 回放。',
      note1:'勝率＝該配置贏的回合 ÷ 出場回合；出場率＝出場回合 ÷ 全部回合；平均得分＝總得點 ÷ 出場回合。',
      note2:'點任一列可展開明細（每回合勝率/出場率、得分方式、勝負、對位戰績、影片來源）。',
      err:'找不到 data/ranking.js，請先執行「排行榜更新.bat」產生資料。'
    },
    en: {
      title:'Beyblade Data · Combo Rankings',
      stats:'Total rounds on site: {n}',
      col_combo:'Combo (Blade / Ratchet / Bit)', col_wr:'Win Rate', col_pr:'Pick Rate', col_ap:'Avg Points', col_n:'Rounds',
      mode_blade:'Blade', mode_ratchet:'Ratchet', mode_bit:'Bit',
      view_full:'Full', view_blade:'By Blade', view_ratchet:'By Ratchet', view_bit:'By Bit',
      ph_combo:'Search (blade / ratchet / bit)', ph_blade:'Search blade', ph_ratchet:'Search ratchet', ph_bit:'Search bit',
      d_perround:'Per Round', d_round:'Round', d_plays:'Plays', d_wr:'Win Rate', d_share:'Share', d_career:'Career', d_sum:'Total',
      d_finish:'Finish Types', d_wl:'W / L Sample', d_win:'Win', d_loss:'Loss', d_avg:'Avg',
      fin:{Spin:'Spin', Over:'Over', Burst:'Burst', Xtreme:'Xtreme'},
      src:'Video Sources', d_match:'Matchups (who beats who)', d_opp:'Opponent', d_faced:'Faced',
      s_by:'Combinations', s_rb:'Ratchet · Bit', s_n:'Rounds', s_combos:'combos',
      m_nodata:'No data',
      view_players:'Players', col_player:'Player', col_record:'Record', rec_w:'W', rec_l:'L',
      col_wr_battle:'Match WR', col_rounds:'Rounds', col_wr_round:'Round WR', col_avg_round:'Pts/Round', show_more:'Show more', show_less:'Show less',
      ph_player:'Search player', d_topbeys:'Top Beys', d_record:'Match History', d_replay:'Replay', d_mine:'Player', d_result:'Result', p_vs:'vs',
      pnote1:'Win Rate = battles won ÷ battles played; Record = wins-losses; expand a player for career per-round stats and finish types.',
      pnote2:'Click a player for top beys, per-round, finishes and history; click a battle to expand rounds with a YouTube replay.',
      note1:'Win Rate = rounds won ÷ rounds played; Pick Rate = rounds played ÷ all rounds; Avg Points = total points ÷ rounds played.',
      note2:'Click any row to expand details (per-round win/pick rate, finish types, W/L, matchups, video sources).',
      err:'data/ranking.js not found. Run "排行榜更新.bat" to generate data first.'
    },
    ja: {
      title:'ベイブレード大データ · 組み合わせランキング',
      stats:'収録データ：全 {n} ラウンド',
      col_combo:'組み合わせ（ブレード / ラチェット / ビット）', col_wr:'勝率', col_pr:'出場率', col_ap:'平均得点', col_n:'出場数',
      mode_blade:'ブレード', mode_ratchet:'ラチェット', mode_bit:'ビット',
      view_full:'詳細', view_blade:'ブレード', view_ratchet:'ラチェット', view_bit:'ビット',
      ph_combo:'検索（ブレード／ラチェット／ビット）', ph_blade:'ブレードで検索', ph_ratchet:'ラチェットで検索', ph_bit:'ビットで検索',
      d_perround:'各ラウンド', d_round:'ラウンド', d_plays:'出場', d_wr:'勝率', d_share:'出場比', d_career:'通算', d_sum:'合計',
      d_finish:'決着方法', d_wl:'勝敗サンプル', d_win:'勝', d_loss:'敗', d_avg:'平均得点',
      fin:{Spin:'スピン', Over:'オーバー', Burst:'バースト', Xtreme:'エクストリーム'},
      src:'映像出典', d_match:'対戦成績（相性）', d_opp:'相手の組み合わせ', d_faced:'遭遇',
      s_by:'組み合わせ別', s_rb:'ラチェット · ビット', s_n:'出場数', s_combos:'種',
      m_nodata:'データなし',
      view_players:'選手', col_player:'選手', col_record:'戦績', rec_w:'勝', rec_l:'敗',
      col_wr_battle:'試合勝率', col_rounds:'出場ラウンド', col_wr_round:'ラウンド勝率', col_avg_round:'ラウンド平均得点', show_more:'もっと見る', show_less:'折りたたむ',
      ph_player:'選手名で検索', d_topbeys:'よく使うベイ', d_record:'戦績', d_replay:'リプレイ', d_mine:'本人', d_result:'勝敗', p_vs:'vs',
      pnote1:'勝率＝3on3 試合の勝利 ÷ 出場試合；戦績＝勝-敗；選手を展開すると通算ラウンド別記録と決着方法を表示。',
      pnote2:'選手をクリックでよく使うベイ・ラウンド別・決着方法・戦績を表示；試合をクリックでラウンド展開＋YouTube リプレイ。',
      note1:'勝率＝勝ったラウンド ÷ 出場ラウンド；出場率＝出場ラウンド ÷ 全ラウンド；平均得点＝総得点 ÷ 出場ラウンド。',
      note2:'任意の行をクリックで詳細表示（ラウンド別勝率/出場率、決着方法、勝敗、対戦成績、映像出典）。',
      err:'data/ranking.js が見つかりません。先に「排行榜更新.bat」を実行してください。'
    }
  };
  function t(k){ return (I18N[lang] || I18N.zh)[k]; }
  function finName(k){ return ((I18N[lang] || I18N.zh).fin || {})[k] || k; }
  function paren(n){ return lang==='en' ? ' ('+n+')' : '（'+n+'）'; }
  function srcCount(n){ return lang==='en' ? ' ('+n+')' : (lang==='ja' ? '（'+n+'件）' : '（'+n+' 場）'); }
  // 來源連結清單：顯示影片真正的 YouTube 標題（無賽事標籤、不顯示「誰使用」）
  function sourcesLinks(src){
    src = src || [];
    if(!src.length) return '<div class="dim">'+t('m_nodata')+'</div>';
    var cnt = {};   // 同名標題（長直播分段）出現次數，用來決定要不要附對戰名區分
    src.forEach(function(s){ var k=s.video_title||''; if(k) cnt[k]=(cnt[k]||0)+1; });
    return src.map(function(s){
      var name = s.video_title || s.title || '';
      if(s.video_title && cnt[s.video_title] > 1 && s.title) name += '（'+s.title+'）';
      return '<a href="'+encodeURI(s.url)+'" target="_blank" rel="noopener">'+esc(name)+'</a>';
    }).join('');
  }

  function pct(x){ return (x*100).toFixed(1) + '%'; }
  function wrColor(w){ return w>=0.6 ? 'var(--good)' : (w<=0.4 ? 'var(--bad)' : 'var(--mid)'); }

  function pic(c){
    var arr = c.blade_imgs || [];
    if(arr.length){
      var cls = arr.length>1 ? 'pic multi' : 'pic';
      var imgs = arr.map(function(src){
        return '<img class="'+cls+'" src="'+src+'" alt="" onerror="this.style.display=\'none\'">';
      }).join('');
      return '<span class="pics">'+imgs+'</span>';
    }
    return '<div class="ph">'+initials(c.blade)+'</div>';
  }
  function initials(s){
    s = (s||'').trim();
    var m = s.match(/[A-Za-z]+/g);
    if(m) return (m[0][0] + (m[1]?m[1][0]:'')).toUpperCase();
    return s.slice(0,2);
  }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }); }

  // 固鎖/軸心彙總：用 phstudy 零件圖（data/images_parts/{type}/{code}.png；缺圖自動退回代號徽章）

  // 依目前語言取上蓋名稱（中/日缺名時退回英文）
  function bladeName(c){
    var en = c.blade_label || c.blade;
    if(lang==='zh') return c.blade_zh || en;
    if(lang==='ja') return c.blade_ja || en;

  // 對手配置字串為「上蓋 固鎖 軸心」，反解上蓋並依語言翻名（固鎖／軸心代號維持原樣）
  var oppMap = {};        // 上蓋名 -> combo（給翻名用）
  var comboByKey = {};    // 完整配置字串 -> combo（給對手彈窗查圖片用）
  D.combos.forEach(function(c){ oppMap[c.blade] = c; comboByKey[c.combo] = c; });
  function oppName(opp){
    var p = (opp||'').split(' ');
    if(p.length < 3) return opp;
    var bit = p.pop(), rat = p.pop(), blade = p.join(' ');
    var info = oppMap[blade];
    return info ? bladeName(info)+' '+rat+' '+bit : opp;
  }

  // ---- 明細面板 ----
  var FIN = ['Spin','Over','Burst','Xtreme'];
  var FINC = {Spin:'#7f8aa3', Over:'#4d8dff', Burst:'#ffb04d', Xtreme:'#c061ff'};

  function roundsTable(c, hideShare){
    var rs = Object.keys(c.rounds||{}).map(Number).sort(function(a,b){return a-b;});
    if(!rs.length) return '<div class="dim">—</div>';

      return '<tr><td class="l">R'+r+'</td><td>'+ap+'</td>'
        +'<td style="color:'+wrColor(wr)+'">'+pct(wr)+'</td>'+share+'</tr>';
    }).join('');
    var shareTh = hideShare ? '' : '<th>'+t('d_share')+'</th>';
    return '<table class="mini"><tr><th class="l">'+t('d_round')+'</th><th>'+t('d_plays')+'</th><th>'+t('d_wr')+'</th>'+shareTh+'</tr>'+body+'</table>';

      return '<div class="frow"><span class="flbl">'+esc(finName(k))+'</span>'
        +'<span class="fbar"><i style="width:'+(p*100)+'%;background:'+FINC[k]+'"></i></span>'
        +'<span class="fval">'+n+'（'+pct(p)+'）</span></div>';

  function matchupTable(ms, sortk, dir){

  // pi 有值時（嵌在選手面板裡）用 data-pi+data-combo 反查該選手的個人配置物件，否則用主表索引 data-i

  // ---- 彙總模式：依上蓋/固鎖/軸心(dim) 把所有搭配的數據合併 ----
  var _aggCache = {};
  function aggByDim(dim){
    if(_aggCache[dim]) return _aggCache[dim];
    var total = D.total_appearances || D.combos.reduce(function(s,c){ return s+c.appearances; }, 0);
    var map = {};
    D.combos.forEach(function(c){
      var key = c[dim];
      var g = map[key];
      if(!g){
        g = map[key] = { dim:dim, key:key, appearances:0, wins:0, points:0, combos:[] };
        if(dim==='blade'){   // 上蓋彙總沿用顯示欄位與圖片
          g.blade=c.blade; g.blade_label=c.blade_label; g.blade_zh=c.blade_zh;
          g.blade_ja=c.blade_ja; g.system=c.system; g.blade_imgs=c.blade_imgs;
        }
      }
      g.appearances += c.appearances;
      g.wins += c.wins;
      g.points += (c.points || 0);
      g.combos.push(c);
    });
    _aggCache[dim] = Object.keys(map).map(function(k){
      var g = map[k];
      g.winrate    = g.appearances ? g.wins/g.appearances : 0;
      g.pickrate   = total ? g.appearances/total : 0;
      g.avg_points = g.appearances ? g.points/g.appearances : 0;
      return g;
    });
    return _aggCache[dim];
  }
  // 彙總展開時，每列要顯示「另外兩個維度」的搭配
  function pairLabel(dim){
    if(dim==='ratchet') return t('mode_blade')+' · '+t('mode_bit');
    if(dim==='bit')     return t('mode_blade')+' · '+t('mode_ratchet');
    return t('mode_ratchet')+' · '+t('mode_bit');   // dim==='blade'
  }
  function pairText(c, dim){
    if(dim==='ratchet') return bladeName(c)+' · '+(c.bit||'—');
    if(dim==='bit')     return bladeName(c)+' · '+(c.ratchet||'—');
    return (c.ratchet||'—')+' · '+(c.bit||'—');      // dim==='blade'
  }
  // 彙總展開：列出該部件的每個搭配，欄位可點擊排序
  function slimTable(g, sortk, dir){
    var dim = g.dim, combos = g.combos || [];
    var arr = combos.slice().sort(function(a,b){
      var x, y;
      if(sortk==='rb'){ x=pairText(a,dim).toLowerCase(); y=pairText(b,dim).toLowerCase(); }
      else { x=a[sortk]; y=b[sortk]; }
      if(x<y) return -dir; if(x>y) return dir;
      return b.appearances - a.appearances;
    });
    function th(k,label,cls){
      var on = (sortk===k);
      var ar = on ? (dir<0?'▼':'▲') : '◀';
      return '<th class="sm '+(cls||'')+'" data-sk="'+k+'">'+label+'<span class="ar'+(on?' on':'')+'">'+ar+'</span></th>';
    }
    var body = arr.map(function(c){
      var ns = (c.sources||[]).length;
      return '<tr><td class="l">'+esc(pairText(c,dim))+'</td>'
        +'<td style="color:'+wrColor(c.winrate)+'">'+pct(c.winrate)+'</td>'
        +'<td>'+pct(c.pickrate)+'</td>'
        +'<td>'+c.avg_points.toFixed(2)+'</td>'
        +'<td>'+c.appearances+'</td>'
        +'<td class="srccell"><span class="srctoggle" data-key="'+esc(c.combo)+'">'+t('src')+paren(ns)+'</span></td></tr>';
    }).join('');
    return '<table class="mini"><tr>'
      +th('rb',pairLabel(dim),'l')+th('winrate',t('d_wr'))+th('pickrate',t('col_pr'))
      +th('avg_points',t('col_ap'))+th('appearances',t('s_n'))+'<th>'+t('src')+'</th>'
      +'</tr>'+body+'</table>';
  }
  function slimDetailHTML(g, i){
    return '<div class="detailwrap"><div class="dcol" style="flex:1 1 100%">'
      +'<div class="dh">'+t('s_by')+'</div>'
      +'<div class="slimwrap" data-i="'+i+'" data-sk="appearances" data-dir="-1">'
      +slimTable(g, 'appearances', -1)
      +'</div></div></div>';
  }
  // 搜尋比對：完整模式比對該配置；彙總模式只要底下任一搭配符合即顯示
  function bladeHay(x){ return [x.blade_label||'', x.blade||'', x.blade_zh||'', x.blade_ja||''].join(' ').toLowerCase(); }
  // 單一配置的可搜尋字串：上蓋名（中／英／日）＋固鎖＋軸心
  function comboHay(x){ return (bladeHay(x)+' '+(x.ratchet||'')+' '+(x.bit||'')).toLowerCase(); }
  // 單框自動比對：打上蓋名／固鎖／軸心代號都能命中，不需選欄位
  function matchRow(c){
    var q = searchText.trim().toLowerCase();
    if(!q) return true;
    if(view==='blade')   return bladeHay(c).indexOf(q) >= 0;            // 上蓋模式：只搜上蓋名
    if(view==='ratchet' || view==='bit')                               // 固鎖/軸心模式：只搜該部件代號
      return String(c.key||'').toLowerCase().indexOf(q) >= 0;
    if(c.combos){  // 完整模式的彙總列：自身上蓋名 或 底下任一搭配命中
      return bladeHay(c).indexOf(q)>=0 || c.combos.some(function(x){ return comboHay(x).indexOf(q)>=0; });
    }
    return comboHay(c).indexOf(q)>=0;
  }

  // ---- 表頭 / 搜尋 / 說明（依模式切換；選手模式欄位不同）----
  function headHTML(){

  // ---- 選手模式：從 D.battles 聚合每位選手 ----
  var FINPTS = {Spin:1, Over:2, Burst:2, Xtreme:3, Draw:0};
  var _players = null;
  function aggPlayers(){
    if(_players) return _players;
    var map = {};
    (D.battles||[]).forEach(function(bt){
      [['a', bt.player_a, bt.player_b], ['b', bt.player_b, bt.player_a]].forEach(function(t3){
        var side=t3[0], name=t3[1], opp=t3[2];
        if(!name) return;
        var p = map[name];
        if(!p){
          p = map[name] = { name:name, battles:0, bwins:0,
            rounds:0, rwins:0, rpoints:0,
            perRound:{}, perRoundPoints:{}, perRoundWins:{}, finishes:{}, combosUsed:{}, history:[] };
        }
        p.battles++;
        var won = !!bt.battle_winner && bt.battle_winner===side.toUpperCase();
        if(won) p.bwins++;
        (bt.rounds||[]).forEach(function(r){
          var combo = (side==='a'?r.a:r.b) || '';
          if(!combo.trim()) return;
          p.rounds++;
          var rno = r.no;
          p.perRound[rno] = (p.perRound[rno]||0) + 1;
          var rwon = !!r.winner && r.winner===side.toUpperCase();
          if(rwon){
            p.rwins++;
            p.rpoints += (FINPTS[r.finish]||0);
            p.perRoundPoints[rno] = (p.perRoundPoints[rno]||0) + (FINPTS[r.finish]||0);
            p.perRoundWins[rno] = (p.perRoundWins[rno]||0) + 1;
            if(r.finish) p.finishes[r.finish] = (p.finishes[r.finish]||0) + 1;
          }
          // 以「完整配置」歸戶，累計『該選手用此配置』的個人數據（圖/名等身分沿用全站 c）
          var c = comboByKey[combo];
          var cu = p.combosUsed[combo];
          if(!cu){
            cu = p.combosUsed[combo] = {
              combo: combo,
              blade: c?c.blade:combo, blade_label: c?c.blade_label:combo,
              blade_zh: c?c.blade_zh:'', blade_ja: c?c.blade_ja:'',
              ratchet: c?c.ratchet:'', bit: c?c.bit:'', system: c?c.system:'',
              blade_imgs: c?c.blade_imgs:[],
              appearances:0, wins:0, points:0,
              finishes:{}, rounds:{}, round_wins:{}, _mu:{}, _src:{}
            };
          }
          cu.appearances++;
          cu.rounds[rno] = (cu.rounds[rno]||0) + 1;
          if(rwon){
            cu.wins++;
            cu.points += (FINPTS[r.finish]||0);
            cu.round_wins[rno] = (cu.round_wins[rno]||0) + 1;
            if(r.finish) cu.finishes[r.finish] = (cu.finishes[r.finish]||0) + 1;
          }
          // 個人對位：他用此配置那回合的對手配置
          var oppCombo = (side==='a'?r.b:r.a) || '';
          if(oppCombo.trim()){
            var mu = cu._mu[oppCombo] || (cu._mu[oppCombo] = {n:0, wins:0, sources:{}});
            mu.n++; if(rwon) mu.wins++;
            if(bt.video_url && !mu.sources[bt.video_url]){
              mu.sources[bt.video_url] = { url:bt.video_url, event:bt.event,
                title:(bt.player_a||'?')+' vs '+(bt.player_b||'?'), video_title:bt.video_title };
            }
          }
          // 個人來源：他用此配置出現過的影片（依影片去重）
          if(bt.video_url && !cu._src[bt.video_url]){
            cu._src[bt.video_url] = { url:bt.video_url, event:bt.event, date:bt.date,
              title:(bt.player_a||'?')+' vs '+(bt.player_b||'?'), video_title:bt.video_title };
          }
        });
        p.history.push({ bt:bt, side:side, opp:opp, won:won,
          myscore:(side==='a'?bt.final_score_a:bt.final_score_b),
          oppscore:(side==='a'?bt.final_score_b:bt.final_score_a) });
      });
    });
    _players = Object.keys(map).map(function(k){
      var p = map[k];
      p.winrate       = p.battles ? p.bwins/p.battles : 0;   // 整場 3on3 勝率
      p.round_winrate = p.rounds ? p.rwins/p.rounds : 0;     // 回合勝率
      p.avg_round     = p.rounds ? p.rpoints/p.rounds : 0;   // 回合平均得分
      // 用過的所有完整配置：把個人累計算成 detailHTML 能直接吃的 combo 物件（依使用次數排序）
      p.allCombos  = Object.keys(p.combosUsed).map(function(k2){ return p.combosUsed[k2]; });
      p.allCombos.forEach(function(cu){
        cu.winrate    = cu.appearances ? cu.wins/cu.appearances : 0;
        cu.pickrate   = p.rounds ? cu.appearances/p.rounds : 0;   // 出場率＝他用此配置回合 ÷ 他全部回合
        cu.avg_points = cu.appearances ? cu.points/cu.appearances : 0;
        cu.matchups = Object.keys(cu._mu).map(function(opp){
          var m = cu._mu[opp];
          return { opp:opp, n:m.n, wins:m.wins, winrate:m.n?m.wins/m.n:0,
                   sources:Object.keys(m.sources).map(function(s){ return m.sources[s]; }) };
        }).sort(function(a,b){ return (b.n-a.n) || (b.winrate-a.winrate); });
        cu.sources = Object.keys(cu._src).map(function(s){ return cu._src[s]; });
      });
      p.allCombos.sort(function(a,b){ return b.appearances-a.appearances; });
      return p;
    });
    return _players;
  }
  function matchPlayer(p){
    var q = searchText.trim().toLowerCase();
    return !q || (p.name||'').toLowerCase().indexOf(q) >= 0;
  }
  // 戰績字串：中「6勝0敗」/ 英「6W 0L」/ 日「6勝0敗」
  function recordStr(w, l){

    return w + t('rec_w') + sep + l + t('rec_l');

  // 常用陀螺：每個配置一列＝仿完整陀螺主列（圖＋名＋固鎖·軸心｜勝率｜出場率｜平均得分｜場數｜影片來源），
  // 點該列展開＝該配置的「全站」明細（每回合／得分方式／勝負樣本／對位戰績），與配置排行榜一致。
  function playerComboRow(cu, pi){
    var head = '<div class="pcmain" data-pi="'+pi+'" data-combo="'+esc(cu.combo)+'">'
      +'<div class="cwrap pccfg">'+pic(cu)
        +'<div class="nm"><span class="blade">'+esc(bladeName(cu))
          +(cu.system==='CX'?'<span class="tag">CX</span>':'')+'</span>'
          +'<span class="sub">'+esc(cu.ratchet||'—')+' · '+esc(cu.bit||'—')+'</span></div></div>'
      +'<span class="pcnum wr" style="color:'+wrColor(cu.winrate)+'">'+pct(cu.winrate)+'</span>'
      +'<span class="pcnum">'+pct(cu.pickrate)+'</span>'
      +'<span class="pcnum">'+cu.avg_points.toFixed(2)+'</span>'
      +'<span class="pcnum dim">'+cu.appearances+'</span>'
      +'<span class="pcsrc"><span class="srctoggle" data-pi="'+pi+'" data-combo="'+esc(cu.combo)+'">'+t('src')+paren((cu.sources||[]).length)+'</span></span>'
    +'</div>';
    return '<div class="pcrow">'+head+'<div class="pcdetail hidden">'+detailHTML(cu,null,cu.combo,pi)+'</div></div>';
  }
  // 常用陀螺表頭（可點擊排序；目前排序欄顯示箭頭）
  function pcHead(sk, dir){
    function cell(k, label, cls){
      var on = (sk===k);
      var ar = on ? (dir<0?'▼':'▲') : '◀';
      return '<span class="'+cls+' pcsort" data-sk="'+k+'">'+label+'<span class="ar'+(on?' on':'')+'">'+ar+'</span></span>';
    }
    return '<div class="pchead">'
      + cell('blade', t('d_topbeys'), 'pccfg')
      + cell('winrate', t('col_wr'), 'pcnum')
      + cell('pickrate', t('col_pr'), 'pcnum')
      + cell('avg_points', t('col_ap'), 'pcnum')
      + cell('appearances', t('col_rounds'), 'pcnum')
      + '<span class="pcsrc">'+t('src')+'</span>'
    +'</div>';
  }
  // div 型清單：預設只顯示前 n 列，其餘收進 .morewrap，附「顯示更多」按鈕（inline、一次展開全部）
  function moreWrap(rows, n){
    if(rows.length <= n) return rows.join('');
    var extra = rows.length - n;
    return rows.slice(0, n).join('')
      + '<div class="morewrap hidden">' + rows.slice(n).join('') + '</div>'
      + '<div class="showmore" data-more="' + extra + '">' + t('show_more') + '（' + extra + '）▼</div>';
  }
  // 依排序鍵排好的配置列（名稱用 bladeName 比字串、其餘比數值；同值以場數降冪 tiebreak）
  function playerComboRows(p, pi, sk, dir){
    var arr = p.allCombos.slice().sort(function(a,b){
      var x, y;
      if(sk==='blade'){ x=bladeName(a).toLowerCase(); y=bladeName(b).toLowerCase(); }
      else { x=a[sk]; y=b[sk]; }
      if(x<y) return -dir; if(x>y) return dir;
      return b.appearances - a.appearances;
    });
    return moreWrap(arr.map(function(cu){ return playerComboRow(cu, pi); }), 5);
  }
  // 列出該選手用過的所有完整配置（仿排行榜：可排序表頭＋每列可展開「個人」明細）
  function playerComboList(p, pi){
    if(!p.allCombos.length) return '<div class="dim">—</div>';
    var sk='appearances', dir=-1;   // 預設依場數（最常用）由多到少
    return '<div class="pclist" data-pi="'+pi+'" data-sk="'+sk+'" data-dir="'+dir+'">'
      + pcHead(sk,dir) + playerComboRows(p, pi, sk, dir) + '</div>';
  }
  // 每回合表現（沿用 roundsTable 版面，改餵選手資料）
  function playerRoundsTable(p){
    var rs = Object.keys(p.perRound).map(Number).sort(function(a,b){return a-b;});
    if(!rs.length) return '<div class="dim">—</div>';
    var body = rs.map(function(r){
      var ap=p.perRound[r]||0, w=p.perRoundWins[r]||0;
      var wr=ap?w/ap:0;
      var avg=ap?(p.perRoundPoints[r]||0)/ap:0;
      return '<tr><td class="l">R'+r+'</td><td>'+ap+'</td>'
        +'<td style="color:'+wrColor(wr)+'">'+pct(wr)+'</td>'
        +'<td>'+avg.toFixed(2)+'</td></tr>';
    }).join('');
    // 合計列已移到外層選手列（出場回合／回合勝率／回合平均得分），這裡只留逐回合
    return '<table class="mini"><tr><th class="l">'+t('d_round')+'</th><th>'+t('d_plays')+'</th><th>'+t('d_wr')+'</th><th>'+t('d_avg')+'</th></tr>'+body+'</table>';
  }
  // 單場逐回合計分板：我方配置 vs 對方配置、結束方式、勝負
  function battleScoreboard(h){
    var side = h.side;
    var body = (h.bt.rounds||[]).map(function(r){
      var mine = (side==='a'?r.a:r.b), opp = (side==='a'?r.b:r.a);
      var rwon = !!r.winner && r.winner===side.toUpperCase();
      var w = r.winner ? (rwon?t('d_win'):t('d_loss')) : '—';
      var wc = r.winner ? (rwon?'var(--good)':'var(--bad)') : 'var(--dim)';
      return '<tr><td class="l">R'+r.no+'</td>'
        +'<td class="l">'+esc(oppName(mine))+'</td>'
        +'<td>'+esc(r.finish?finName(r.finish):'—')+'</td>'
        +'<td class="l">'+esc(oppName(opp))+'</td>'
        +'<td style="color:'+wc+'">'+w+'</td></tr>';
    }).join('');
    return '<table class="mini"><tr><th class="l">'+t('d_round')+'</th><th class="l">'+t('d_mine')+'</th><th>'+t('d_finish')+'</th><th class="l">'+t('d_opp')+'</th><th>'+t('d_result')+'</th></tr>'+body+'</table>';
  }
  // 戰績列表（OP.GG 式）：一場一列，可展開逐回合＋YT 回放
  function playerHistory(p){
    if(!p.history.length) return '<div class="dim">—</div>';
    var hs = p.history.slice().sort(function(a,b){
      var x=a.bt.date||'', y=b.bt.date||'';
      return x<y?1:(x>y?-1:0);   // 新到舊
    });
    var rows = hs.map(function(h){
      var res = h.won ? '<span style="color:var(--good)">'+t('d_win')+'</span>'
                      : '<span style="color:var(--bad)">'+t('d_loss')+'</span>';
      var score = esc((h.myscore||'0')+'-'+(h.oppscore||'0'));
      var rep = h.bt.video_url ? '<a class="replay" href="'+encodeURI(h.bt.video_url)+'" target="_blank" rel="noopener">▶ '+t('d_replay')+'</a>' : '';
      var evt = esc(h.bt.event||'') + (h.bt.date?(' · '+esc(h.bt.date)):'');
      return '<div class="bhrow">'
        +'<div class="bhmain">'
          +'<span class="bhopp">'+t('p_vs')+' '+esc(h.opp||'?')+'</span>'
          +'<span class="bhres">'+res+' '+score+'</span>'
          +'<span class="bhevt dim">'+evt+'</span>'
          +rep
        +'</div>'
        +'<div class="bhrounds hidden">'+battleScoreboard(h)+'</div>'
      +'</div>';
    });
    return moreWrap(rows, 5);
  }
  function playerDetailHTML(p, pi){
    return '<div class="detailwrap">'
      +'<div class="dcol" style="flex:1 1 100%">'
        +'<div style="display:flex;flex-wrap:wrap;gap:18px">'
          +'<div style="flex:2 1 360px"><div class="dh">'+t('d_career')+'</div>'+playerRoundsTable(p)+'</div>'
          +'<div style="flex:1 1 200px"><div class="dh">'+t('d_finish')+'</div>'+finishBlock(p)+'</div>'
        +'</div>'
      +'</div>'
      +'<div class="dcol" style="flex:1 1 100%"><div class="dh">'+t('d_topbeys')+'</div>'+playerComboList(p, pi)+'</div>'
      +'<div class="dcol" style="flex:1 1 100%"><div class="dh">'+t('d_record')+'</div>'+playerHistory(p)+'</div>'
    +'</div>';
  }
  function renderPlayers(){
    var arr = aggPlayers().filter(matchPlayer);
    arr.sort(function(a,b){
      var x=a[sortKey], y=b[sortKey];
      if(x==null) x=0; if(y==null) y=0;
      if(x<y) return -sortDir; if(x>y) return sortDir;
      return b.battles - a.battles;
    });
    currentArr = arr;
    rowsEl.innerHTML = arr.map(function(p,i){
      return '<tr class="main" data-i="'+i+'">'
        +'<td class="rank">'+(i+1)+'</td>'
        +'<td class="combo"><div class="cwrap"><div class="nm"><span class="blade">'+esc(p.name)+'</span></div></div></td>'
        +'<td class="num wr" style="color:'+wrColor(p.winrate)+'">'+pct(p.winrate)
          +'<div class="bar"><i style="width:'+(p.winrate*100)+'%;background:'+wrColor(p.winrate)+'"></i></div></td>'
        +'<td class="num">'+recordStr(p.bwins, p.battles-p.bwins)+'</td>'
        +'<td class="num" style="color:var(--dim)">'+p.rounds+'</td>'
        +'<td class="num" style="color:'+wrColor(p.round_winrate)+'">'+pct(p.round_winrate)+'</td>'
        +'<td class="num">'+p.avg_round.toFixed(2)+'</td>'
        +'</tr>'
        +'<tr class="detail hidden"><td colspan="7">'+playerDetailHTML(p, i)+'</td></tr>';
    }).join('');
    var ars = thead.querySelectorAll('th .ar');
    for(var j=0;j<ars.length;j++){ ars[j].textContent='◀'; ars[j].classList.remove('on'); }
    var th = thead.querySelector('th[data-k="'+sortKey+'"] .ar');
    if(th){ th.textContent = sortDir<0 ? '▼' : '▲'; th.classList.add('on'); }
  }

  function render(){
    if(view==='players'){ renderPlayers(); return; }
    var agg = view!=='full';
    var partAgg = (view==='ratchet' || view==='bit');   // 固鎖/軸心：無圖、用代號
    var arr = (agg ? aggByDim(view) : D.combos).filter(matchRow);
    arr.sort(function(a,b){
      var x=a[sortKey], y=b[sortKey];
      if(x<y) return -sortDir; if(x>y) return sortDir;
      return b.appearances - a.appearances;
    });
    currentArr = arr;
    rowsEl.innerHTML = arr.map(function(c,i){
      var nm = partAgg ? esc(c.key) : esc(bladeName(c));
      var picHtml = partAgg ? partPic(view, c.key) : pic(c);
      var cxTag = (!partAgg && c.system==='CX') ? '<span class="tag">CX</span>' : '';
      var sub = !agg ? '<span class="sub">'+esc(c.ratchet||'—')+' · '+esc(c.bit||'—')+'</span>'
                     : '<span class="sub">'+(c.combos?c.combos.length:0)+' '+t('s_combos')+'</span>';
      var detail = agg ? slimDetailHTML(c,i) : detailHTML(c,i);
      var srcCell = agg ? '<span class="dim">—</span>'
        : '<span class="srctoggle" data-i="'+i+'">'+t('src')+paren((c.sources||[]).length)+'</span>';
      return '<tr class="main" data-i="'+i+'">'
        + '<td class="rank">'+(i+1)+'</td>'
        + '<td class="combo"><div class="cwrap">'+picHtml
          + '<div class="nm"><span class="blade">'+nm+cxTag+'</span>'
            + sub+'</div>'
          + '</div></td>'
        + '<td class="num wr" style="color:'+wrColor(c.winrate)+'">'+pct(c.winrate)
          + '<div class="bar"><i style="width:'+(c.winrate*100)+'%;background:'+wrColor(c.winrate)+'"></i></div></td>'
        + '<td class="num">'+pct(c.pickrate)+'</td>'
        + '<td class="num">'+c.avg_points.toFixed(2)+'</td>'
        + '<td class="num" style="color:var(--dim)">'+c.appearances+'</td>'
        + '<td class="num src">'+srcCell+'</td>'
        + '</tr>'
        + '<tr class="detail hidden"><td colspan="7">'+detail+'</td></tr>';
    }).join('');
    thead.querySelectorAll('th .ar').forEach(function(s){ s.textContent='◀'; s.classList.remove('on'); });
    var th = thead.querySelector('th[data-k="'+sortKey+'"] .ar');
    if(th){ th.textContent = sortDir<0 ? '▼' : '▲'; th.classList.add('on'); }
  }

  // 選手面板裡的元素：用 data-pi（選手在 currentArr 的索引）+ data-combo 取「個人」配置物件
  function comboCtx(el){
    var pi = el.dataset.pi, ck = el.dataset.combo;
    if(pi===undefined || ck===undefined) return null;
    var p = currentArr[+pi];
    return (p && p.combosUsed) ? p.combosUsed[ck] : null;
  }
  // 點列展開／收合；點「影片來源」開彈窗
  rowsEl.addEventListener('click', function(e){
    if(e.target.closest('a')) return;           // 放行連結（▶回放），不攔截
    var sm = e.target.closest('.showmore');      // 顯示更多／收合：同一顆按鈕切換
    if(sm){
      e.stopPropagation();
      var extra = sm.getAttribute('data-more');
      var moreL = t('show_more')+'（'+extra+'）▼', lessL = t('show_less')+' ▲';
      var smtr = sm.closest('tr.showmore-row');
      if(smtr){                                  // 表格型（對位戰績）
        var moreRows = smtr.closest('table').querySelectorAll('tr.more');
        var collapsed = moreRows.length && moreRows[0].classList.contains('hidden');
        [].forEach.call(moreRows, function(x){ x.classList.toggle('hidden', !collapsed); });
        sm.innerHTML = collapsed ? lessL : moreL;
        return;
      }
      var mw = sm.previousElementSibling;         // div 型（戰績／常用陀螺）
      if(mw && mw.classList.contains('morewrap')){
        var nowHidden = mw.classList.toggle('hidden');
        sm.innerHTML = nowHidden ? moreL : lessL;
      }
      return;
    }
    var bh = e.target.closest('.bhmain');        // 選手戰績：點某場展開逐回合計分板
    if(bh){
      e.stopPropagation();
      var rd = bh.nextElementSibling;
      if(rd && rd.classList.contains('bhrounds')){ rd.classList.toggle('hidden'); bh.classList.toggle('open'); }
      return;
    }
    var tog = e.target.closest('.srctoggle');
    if(tog){   // 影片來源：跳彈窗列出來源影片
      e.stopPropagation();
      var item;
      if(tog.dataset.opp !== undefined){          // 對位：這兩顆對戰的影片
        var mw = tog.closest('.muwrap');
        var msrc = mw.dataset.pi!==undefined ? comboCtx(mw) : currentArr[+mw.getAttribute('data-i')];
        item = ((msrc&&msrc.matchups)||[]).filter(function(x){ return x.opp===tog.dataset.opp; })[0];
      } else if(tog.dataset.key !== undefined){   // 精簡模式：依配置鍵找到該搭配
        var sw2 = tog.closest('.slimwrap'); var bi = +sw2.getAttribute('data-i');
        item = (currentArr[bi].combos||[]).filter(function(x){ return x.combo===tog.dataset.key; })[0];
      } else if(tog.dataset.pi !== undefined){    // 選手面板：配置主列「個人」影片來源
        item = comboCtx(tog);
      } else {                                     // 完整模式主列
        item = currentArr[+tog.getAttribute('data-i')];
      }
      openModal(item);
      return;
    }
    var oppCell = e.target.closest('td.opp');
    if(oppCell){
      e.stopPropagation();
      openOppModal(oppCell.getAttribute('data-opp'));
      return;
    }
    var muth = e.target.closest('th.mu');
    if(muth){
      e.stopPropagation();
      var wrap = muth.closest('.muwrap');
      var muc = wrap.dataset.pi!==undefined ? comboCtx(wrap) : currentArr[+wrap.getAttribute('data-i')];
      var k = muth.getAttribute('data-mk');
      var cur = wrap.getAttribute('data-mk'), dir = +wrap.getAttribute('data-dir');
      if(cur===k){ dir = -dir; } else { dir = (k==='opp') ? 1 : -1; }  // 名稱預設升冪、數字預設降冪
      wrap.setAttribute('data-mk', k); wrap.setAttribute('data-dir', dir);
      wrap.innerHTML = matchupTable(oppMatchups(muc), k, dir);
      return;
    }
    var smth = e.target.closest('th.sm');
    if(smth){
      e.stopPropagation();
      var sw = smth.closest('.slimwrap'); var si = +sw.getAttribute('data-i');
      var sk = smth.getAttribute('data-sk');
      var scur = sw.getAttribute('data-sk'), sdir = +sw.getAttribute('data-dir');
      if(scur===sk){ sdir = -sdir; } else { sdir = (sk==='rb') ? 1 : -1; }  // 名稱升冪、數字降冪
      sw.setAttribute('data-sk', sk); sw.setAttribute('data-dir', sdir);
      sw.innerHTML = slimTable(currentArr[si], sk, sdir);
      return;
    }
    var pcsort = e.target.closest('.pchead .pcsort');   // 常用陀螺表頭：點欄位切換排序
    if(pcsort){
      e.stopPropagation();
      var plist = pcsort.closest('.pclist'); var pp = currentArr[+plist.dataset.pi];
      if(!pp) return;
      var pk = pcsort.dataset.sk, pcur = plist.dataset.sk, pdir = +plist.dataset.dir;
      pdir = (pcur===pk) ? -pdir : (pk==='blade' ? 1 : -1);   // 名稱預設升冪、數字預設降冪
      plist.dataset.sk = pk; plist.dataset.dir = pdir;
      plist.innerHTML = pcHead(pk, pdir) + playerComboRows(pp, +plist.dataset.pi, pk, pdir);
      return;
    }
    var pcm = e.target.closest('.pcmain');       // 選手面板裡的配置列：展開該配置全站明細
    if(pcm && pcm.dataset.combo!==undefined){
      e.stopPropagation();
      var pd = pcm.nextElementSibling;
      if(pd && pd.classList.contains('pcdetail')){ pd.classList.toggle('hidden'); pcm.classList.toggle('open'); }
      return;
    }
    var tr = e.target.closest('tr.main');
    if(!tr) return;
    var d = tr.nextElementSibling;
    if(d && d.classList.contains('detail')){ d.classList.toggle('hidden'); tr.classList.toggle('open'); }
  });

  var modal=document.getElementById('modal'), mtitle=document.getElementById('mtitle'), mbody=document.getElementById('mbody');
  // 影片來源彈窗（主列／對位／精簡共用；不顯示「誰使用」）
  function openModal(c){
    var src=(c&&c.sources)||[];
    mtitle.textContent=t('src')+srcCount(src.length);
    mbody.innerHTML=sourcesLinks(src);
    modal.classList.remove('hidden');
  }
  // 對手配置彈窗：顯示該顆陀螺的圖片與配置
  function openOppModal(opp){
    var c = comboByKey[opp];
    mtitle.textContent = oppName(opp);
    if(!c){ mbody.innerHTML = '<div class="dim">'+t('m_nodata')+'</div>'; modal.classList.remove('hidden'); return; }
    mbody.innerHTML = '<div class="oppcard">'+pic(c)
      +'<div class="nm"><span class="blade">'+esc(bladeName(c))
        +(c.system==='CX'?'<span class="tag">CX</span>':'')+'</span>'
      +'<span class="sub">'+esc((c.ratchet||'—')+' · '+(c.bit||'—'))+'</span></div></div>';
    modal.classList.remove('hidden');
  }
  function closeModal(){ modal.classList.add('hidden'); }
  document.getElementById('mclose').addEventListener('click', closeModal);
  modal.addEventListener('click', function(e){ if(e.target===modal) closeModal(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });

  // 表頭排序：用委派（表頭會依模式重建，不能綁在固定 th 上）
  thead.addEventListener('click', function(e){
    var th = e.target.closest('th[data-k]');
    if(!th) return;
    var k = th.getAttribute('data-k');
    if(k==='rank'||k==='combo'||k==='src'||k==='player') return;
    if(sortKey===k){ sortDir = -sortDir; } else { sortKey = k; sortDir = -1; }
    render();
  });

  // 搜尋：模式切換 + 輸入即時過濾
  // 套用目前語言到靜態介面（標題、欄位標題、下拉選項、搜尋提示、底部說明）
  function applyI18n(){
    document.getElementById('title').textContent = t('title');
    setHead();   // 表頭依模式（配置／選手）重建，含翻譯
    var viewTxt = {full:t('view_full'), blade:t('view_blade'), ratchet:t('view_ratchet'),
                   bit:t('view_bit'), players:t('view_players')};
    Array.prototype.forEach.call(viewSel.options, function(o){ o.textContent = viewTxt[o.value]; });
    updateSearchUI();
    setNote();
    document.getElementById('stats').textContent = t('stats').replace('{n}', D.total_rounds);
  }

  var sbox = document.getElementById('sbox');
  sbox.addEventListener('input', function(){ searchText = sbox.value; render(); });

  // 語言切換：整個介面（含上蓋名稱）跟著切換
  var langSel = document.getElementById('lang');
  langSel.addEventListener('change', function(){ lang = langSel.value; applyI18n(); render(); });

  // 模式切換：完整 / 上蓋 / 固鎖 / 軸心 / 選手
  var viewSel = document.getElementById('view');
  var PLAYER_SORT = ['winrate','bwins','rounds','round_winrate','avg_round'];
  var COMBO_SORT  = ['winrate','pickrate','avg_points','appearances'];
  viewSel.addEventListener('change', function(){
    view = viewSel.value;
    if(view==='players'){                          // 切到選手：用選手欄位的排序鍵
      if(PLAYER_SORT.indexOf(sortKey)<0){ sortKey='winrate'; sortDir=-1; }
    } else if(COMBO_SORT.indexOf(sortKey)<0){      // 切回配置：避開選手專屬鍵
      sortKey='pickrate'; sortDir=-1;
    }
    setHead(); updateSearchUI(); setNote(); render();
  });

  applyI18n();
  render();
})();
</script>
</body>
</html>
